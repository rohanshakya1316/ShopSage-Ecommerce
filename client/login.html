<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 min-h-screen flex justify-center items-center p-4">
    <div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-lg">
      <h2 class="text-3xl font-bold text-center text-indigo-600 mb-2">
        Welcome Back
      </h2>

      <p class="text-center text-gray-500 mb-6">Login to your account</p>

      <form id="loginForm">
        <div class="mb-4">
          <label class="block mb-2">Email</label>
          <input
            type="email"
            placeholder="Enter email"
            class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none"
          />
        </div>

        <div class="mb-4">
          <label class="block mb-2">Password</label>
          <input
            type="password"
            placeholder="Enter password"
            class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none"
          />
        </div>

        <div class="mb-5">
          <label class="block mb-2">Role</label>
          <select class="w-full border rounded-lg px-4 py-3">
            <option>Customer</option>
            <option>Vendor</option>
            <option>Admin</option>
          </select>
        </div>

        <button
          class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700"
        >
          Login
        </button>
      </form>

      <p class="text-center mt-5 text-gray-600">
        Don't have an account?
        <a href="register.html" class="text-indigo-600 font-semibold">
          Register
        </a>
      </p>
    </div>
  </body>
</html>
