<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopSage | Product</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="tailwind.output.css">
</head>
<body>
  <div class="site-shell">
    <nav class="navbar">
      <a class="logo" href="home.html">ShopSage</a>
      <ul class="nav-links">
        <li><a data-nav href="home.html">Home</a></li>
        <li><a data-nav href="products.html">Products</a></li>
        <li><a data-nav href="categories.html">Categories</a></li>
        <li><a data-nav href="deals.html">Deals</a></li>
        <li><a data-nav href="business-dashboard.html">Business</a></li>
      </ul>
      <div class="nav-right">
        <span class="user-label" data-user-name></span>
        <a class="cart-btn" href="cart.html">Cart <span data-cart-count>0</span></a>
        <a class="login-btn" data-login-link href="index.html">Login</a>
        <button class="logout-btn" data-logout-button onclick="logout()" hidden>Logout</button>
      </div>
    </nav>

    <main class="section">
      <div data-product-detail></div>
      <section class="mt-xl">
        <div class="section-header">
          <div>
            <p class="eyebrow">More Picks</p>
            <h2>Related Products</h2>
          </div>
        </div>
        <div class="grid product-grid" data-product-grid="related"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
