<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopSage | Cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="site-shell">
    <nav class="navbar">
      <a class="logo" href="home.html">ShopSage</a>
      <ul class="nav-links">
        <li><a data-nav href="home.html">Home</a></li>
        <li><a data-nav href="products.html">Products</a></li>
        <li><a data-nav href="categories.html">Categories</a></li>
        <li><a data-nav href="deals.html">Deals</a></li>
        <li><a data-nav href="business-dashboard.html">Business</a></li>
      </ul>
      <div class="nav-right">
        <span class="user-label" data-user-name></span>
        <a class="cart-btn" href="cart.html">Cart <span data-cart-count>0</span></a>
        <a class="login-btn" data-login-link href="index.html">Login</a>
        <button class="logout-btn" data-logout-button onclick="logout()" hidden>Logout</button>
      </div>
    </nav>

    <main class="section">
      <div class="section-header">
        <div>
          <p class="eyebrow">Cart</p>
          <h1>Your Cart</h1>
          <p class="section-subtitle">Review products, adjust quantities, and move into checkout.</p>
        </div>
        <a class="secondary-btn" href="products.html">Continue Shopping</a>
      </div>

      <div class="two-column">
        <section class="cart-list" id="cartList"></section>
        <aside class="panel">
          <h2>Order Summary</h2>
          <div class="price-row"><span>Subtotal</span><strong id="subtotal">$0.00</strong></div>
          <div class="price-row"><span>Estimated Shipping</span><strong>Free</strong></div>
          <div class="price-row"><span>Tax</span><strong id="tax">$0.00</strong></div>
          <div class="price-row"><span>Total</span><strong class="price" id="total">$0.00</strong></div>
          <button class="primary-btn full-width mt-lg" id="checkoutBtn" type="button">Proceed to Checkout</button>
        </aside>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
