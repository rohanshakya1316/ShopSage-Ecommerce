<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopSage | Orders</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="site-shell">
    <nav class="navbar">
      <a class="logo" href="home.html">ShopSage</a>
      <ul class="nav-links">
        <li><a data-nav href="home.html">Home</a></li>
        <li><a data-nav href="products.html">Products</a></li>
        <li><a data-nav href="categories.html">Categories</a></li>
        <li><a data-nav href="deals.html">Deals</a></li>
        <li><a data-nav href="business-dashboard.html">Business</a></li>
      </ul>
      <div class="nav-right">
        <span class="user-label" data-user-name></span>
        <a class="cart-btn" href="cart.html">Cart <span data-cart-count>0</span></a>
        <a class="login-btn" data-login-link href="index.html">Login</a>
        <button class="logout-btn" data-logout-button onclick="logout()" hidden>Logout</button>
      </div>
    </nav>

    <main class="section">
      <div class="section-header">
        <div>
          <p class="eyebrow">Orders</p>
          <h1>Your Orders</h1>
          <p class="section-subtitle">Track orders placed through the demo checkout flow.</p>
        </div>
      </div>
      <div class="panel" data-orders-locked hidden>Please log in to view your orders.</div>
      <div class="panel" data-orders-empty hidden>No orders yet. Your next checkout will appear here.</div>
      <div class="grid" data-orders-list></div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
