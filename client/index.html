<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopSage | Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="auth-container">
    <form class="auth-card" id="loginForm">
      <a class="logo" href="home.html">ShopSage</a>
      <h2>Welcome Back</h2>
      <p>Login to continue shopping, checking out, or managing your business.</p>

      <input type="email" id="loginEmail" placeholder="Email Address" required>
      <input type="password" id="loginPassword" placeholder="Password" required>

      <button class="primary-btn" type="submit">Login</button>

      <p class="switch-text">Need an account? <a href="register.html">Register</a></p>
      <p class="switch-text">Just browsing? <a href="home.html">Continue as guest</a></p>

      <div id="loginMessage"></div>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
