<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Details</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-50">

<nav class="bg-slate-900 text-white py-4">
    <div class="max-w-7xl mx-auto px-6 flex justify-between">
        <a href="a.html" class="text-2xl font-bold text-indigo-400">
            ShopSage
        </a>

        <a href="a.html" class="hover:text-indigo-400">
            Back To Products
        </a>
    </div>
</nav>

<section class="max-w-7xl mx-auto px-6 py-12">

<div class="bg-white rounded-3xl shadow-lg p-8">

<div class="grid lg:grid-cols-2 gap-10">

<!-- IMAGE -->
<div>

<img
id="productImage"
class="w-full h-125 object-cover rounded-2xl"
>

</div>

<!-- DETAILS -->
<div>

<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full">
In Stock
</span>

<h1
id="productName"
class="text-4xl font-bold mt-4">
</h1>

<div
id="productPrice"
class="text-4xl font-bold text-indigo-600 mt-4">
</div>

<p
id="productDescription"
class="text-slate-600 mt-6 leading-8">
</p>

<div class="flex gap-4 mt-8">

<button
class="bg-indigo-600 text-white px-8 py-4 rounded-xl hover:bg-indigo-700">
Add To Cart
</button>

<button
class="bg-amber-400 text-slate-900 px-8 py-4 rounded-xl">
Buy Now
</button>

</div>

</div>

</div>

</div>

</section>

<script>

const products = {

1: {
name: "Smart Watch Pro",
price: "$199",
image: "https://picsum.photos/800/700?random=1",
description: "Premium smartwatch with fitness tracking, GPS, heart rate monitor and long battery life."
},

2: {
name: "Premium Hoodie",
price: "$59",
image: "https://picsum.photos/800/700?random=2",
description: "Comfortable premium hoodie made with high quality fabric."
},

3: {
name: "Wireless Earbuds",
price: "$89",
image: "https://picsum.photos/800/700?random=3",
description: "Noise cancelling wireless earbuds with crystal clear sound."
},

4: {
name: "Smart Lamp",
price: "$49",
image: "https://picsum.photos/800/700?random=4",
description: "Modern smart lamp with adjustable brightness levels."
},

5: {
name: "Gaming Mouse",
price: "$39",
image: "https://picsum.photos/800/700?random=5",
description: "High precision gaming mouse for professional gamers."
},

6: {
name: "Leather Jacket",
price: "$149",
image: "https://picsum.photos/800/700?random=6",
description: "Premium leather jacket with modern design."
},

7: {
name: "Travel Backpack",
price: "$79",
image: "https://picsum.photos/800/700?random=7",
description: "Large capacity backpack suitable for travel and hiking."
},

8: {
name: "Coffee Maker",
price: "$129",
image: "https://picsum.photos/800/700?random=8",
description: "Automatic coffee maker for your perfect morning coffee."
}

};

const params = new URLSearchParams(window.location.search);

const id = params.get("id");

const product = products[id];

if(product){

document.getElementById("productName").textContent =
product.name;

document.getElementById("productPrice").textContent =
product.price;

document.getElementById("productImage").src =
product.image;

document.getElementById("productDescription").textContent =
product.description;

}

</script>

</body>
</html>
